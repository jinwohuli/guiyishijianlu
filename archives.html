            { id: 'cn_chengdu_zombie', name: '成都僵尸事件', country: '中国', coords: '30.6°N, 104.1°E', time: '近现代', icon: 'mdi:biohazard', level: 'LEVEL 5', color: 'red', desc: '1995年府南河畔的恐怖传闻。发现多具身着古装的尸体具有攻击性。', background: '1995年，成都府南河畔发生了一起震惊当地的事件。据传说，施工队在挖掘过程中发现了多具身着古装的尸体，这些尸体在接触空气后竟然复活，具有极强的攻击性，导致多人受伤。', witness: '多名当年的中学生声称曾看到军车运送巨大的密封箱离开现场，还有目击者报告看到穿着防化服的人员在现场进行处理。此外，附近居民报告在夜间听到奇怪的嚎叫声和撞击声。', science: '1. 古代寄生虫复苏假说：某些古代寄生虫可能在特定条件下复苏，影响尸体的神经系统；2. 工业化学品泄漏：附近化工厂的化学品泄漏可能导致的幻觉和行为异常；3. 考古发掘中的神经毒气：古墓中的防腐物质可能释放出影响人类神经系统的气体。', impact: '成都僵尸事件是西南地区规模最大的现代都市传说之一，至今仍被当地人津津乐道。它不仅成为了民间传说的重要组成部分，也激发了无数文学和影视作品的创作。', images: [], lastUpdate: '2026-04-10' },
            { id: 'poveglia', name: '波维利亚岛 (Poveglia Island)', country: '意大利', coords: '45.4°N, 12.3°E', time: '近现代', icon: 'mdi:island', level: 'LEVEL 5', color: 'red', desc: '曾作为瘟疫隔离区和精神病院，被称为世界上最受诅咒的岛。岛上土壤50%是骨灰，渔民常捞到人类遗骸，夜间传来尖叫。', background: '波维利亚岛位于意大利威尼斯泻湖中，在历史上曾多次爆发瘟疫。1347-1350年的黑死病期间，数以万计的受害者被隔离在此并死于岛上的麻风病院。20世纪，岛上又建立了精神病院，囚禁了数千名病人。', witness: '多位访问过小岛的探险者和研究人员报告了严重的超自然现象：感受到强烈的压迫感，好像有无形的手在推他们，听到痛苦的呻吟声和尖叫声，看到模糊的人影在岛上徘徊。最令人不安的是，有人在岛上过夜后精神崩溃。', science: '1. 心理因素：长期积累的死亡和痛苦可能创造了强烈的"集体记忆"；2. 地质因素：岛上可能存在特殊的土壤成分，释放出微量有毒气体；3. 声学现象：岛屿的特殊地形可能放大了风声和海浪声。', impact: '波维利亚岛已成为世界上最著名的"鬼岛"之一，激起了无数关于瘟疫历史、超自然现象和人类苦难的好奇。它被多次列为世界上最恐怖的地方之一。', images: [], lastUpdate: '2026-04-10' },
            { id: 'bhangarh-fort', name: '班噶城堡 (Bhangarh Fort)', country: '印度', coords: '27.1°N, 76.4°E', time: '近现代', icon: 'mdi:pillar', level: 'LEVEL 4', color: 'red', desc: '被诅咒的废弃城市，法律禁止日落后进入。在堡内停留的人晚上会遭遇不测。', background: '班噶城堡位于印度拉贾斯坦邦，建于17世纪。这座城堡曾是繁华的城镇，但在某次诅咒后被废弃。传说中，一位名叫辛格的祭司诅咒了整个城堡，导致所有居民在一天内死亡。从那时起，该地区就被法律禁止在日落后进入。', witness: '多位探险者在日落后仍留在城堡中，报告了可怕的经历：听到笑声和脚步声，但看不到任何人，感受到冰冷的存在，夜视仪拍摄到无法解释的人影。有报道称有游客在城堡中过夜后神秘死亡。', science: '1. 声学异常：城堡的特殊建筑结构可能产生声音的回响，创造出诡异的氛围；2. 野生动物：夜间可能有野兽活动；3. 心理因素：对诅咒的恐惧可能导致精神紧张和幻觉。', impact: '班噶城堡已成为印度最著名的灵异地点之一，被列为亚洲十大恐怖地点之首。它吸引了大量国内外的探险者和游客，成为拉贾斯坦邦重要的旅游名片。', images: [], lastUpdate: '2026-04-10' }
        ];

        function renderArchives(data = archiveData) {
            const grid = document.getElementById('archives-grid');
            grid.innerHTML = data.map(item => `
                <div id="${item.id}" class="group card-glow bg-white/5 border border-white/10 p-8 rounded transition-all relative overflow-hidden flex flex-col">
                    <div class="absolute top-0 right-0 p-4 bg-${item.color}-900/20 text-[10px] text-${item.color}-500 font-mono">CODE: ${item.id.toUpperCase()}</div>
                    <div class="mb-6 flex items-center justify-between">
                        <iconify-icon icon="${item.icon}" class="text-4xl text-${item.color}-800"></iconify-icon>
                        <span class="px-2 py-1 bg-${item.color}-800/20 border border-${item.color}-800/50 text-[10px] text-${item.color}-400 font-mono">${item.level}</span>
                    </div>
                    <h3 class="text-2xl font-bold mb-2 title-font text-white">${item.name}</h3>
                    <div class="flex flex-wrap gap-2 mb-4 text-[10px] font-mono text-gray-500">
                        <span>地点: ${item.country} (${item.coords})</span>
                        <span>时间维度: ${item.time}</span>
                    </div>
                    <p class="text-sm text-gray-400 leading-relaxed mb-8 flex-grow">
                        ${item.desc}
                    </p>
                    <div class="flex items-center justify-between border-t border-white/5 pt-4">
                        <span class="text-[10px] text-gray-600 font-mono">UPDATED: ${new Date().toLocaleDateString('zh-CN')}</span>
                        <button onclick="openModal('${item.id}')" class="text-xs text-red-600 font-bold hover:translate-x-1 transition-transform flex items-center">
                            解密详情 <iconify-icon icon="mdi:chevron-right" class="ml-1"></iconify-icon>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const item = archiveData.find(d => d.id === id);
            if (!item) return;

            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('modal-content');
            
            const background = item.background || "作为全球知名的未解之谜，该事件的起源可追溯至早期的历史记载或近代的突发性报告。";
            const witness = item.witness || "多位匿名目击者和调查员报告了以下现象。";
            const science = item.science || "1. 磁场偏转假说；2. 时空奇点理论；3. 大气光学错觉；4. 集体潜意识投射。";
            const impact = item.impact || "该事件已深入渗透进大众流行文化，催生了无数相关创作。";
            const images = item.images || [{url: `https://images.unsplash.com/photo-1501535033-a593d6bb6fe3?auto=format&fit=crop&q=80&w=800`, caption: '档案库存储的现场捕捉影像'}];

            content.innerHTML = `
                <div class="mb-10 flex flex-col md:flex-row md:items-end justify-between border-b border-white/10 pb-6">
                    <div>
                        <p class="text-red-500 font-mono text-xs mb-2 tracking-[0.3em]">DECRYPTION SUCCESSFUL // LEVEL: ${item.level}</p>
                        <h2 class="text-4xl font-bold title-font text-white">${item.name}</h2>
                        <div class="mt-4 flex flex-wrap gap-4 text-xs font-mono text-gray-500">
                            <span class="bg-white/5 px-3 py-1 rounded">地点: ${item.country}</span>
                            <span class="bg-white/5 px-3 py-1 rounded">坐标: ${item.coords}</span>
                            <span class="bg-white/5 px-3 py-1 rounded">时间: ${item.time}</span>
                            <span class="bg-white/5 px-3 py-1 rounded">更新日期: ${new Date().toLocaleDateString('zh-CN')}</span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                    <div class="space-y-10">
                        <section>
                            <h4 class="text-red-600 font-bold mb-3 flex items-center tracking-widest text-sm">
                                <iconify-icon icon="mdi:history" class="mr-2"></iconify-icon> 事件历史背景和起源
                            </h4>
                            <p class="text-gray-300 leading-relaxed text-sm">${background}</p>
                        </section>

                        <section>
                            <h4 class="text-red-600 font-bold mb-3 flex items-center tracking-widest text-sm">
                                <iconify-icon icon="mdi:eye-outline" class="mr-2"></iconify-icon> 详细的目击者描述和报告
                            </h4>
                            <p class="text-gray-300 leading-relaxed text-sm bg-red-900/5 p-4 border-l-2 border-red-900/50">${witness}</p>
                        </section>

                        <section>
                            <h4 class="text-red-600 font-bold mb-3 flex items-center tracking-widest text-sm">
                                <iconify-icon icon="mdi:flask-outline" class="mr-2"></iconify-icon> 各种科学解释和假说
                            </h4>
                            <div class="text-gray-400 text-sm italic space-y-2">
                                ${science.split('；').map(s => `<p>• ${s.trim()}</p>`).join('')}
                            </div>
                        </section>

                        <section>
                            <h4 class="text-red-600 font-bold mb-3 flex items-center tracking-widest text-sm">
                                <iconify-icon icon="mdi:earth" class="mr-2"></iconify-icon> 事件的社会文化影响范围
                            </h4>
                            <p class="text-gray-300 leading-relaxed text-sm">${impact}</p>
                        </section>
                    </div>

                    <div class="space-y-6">
                        <h4 class="text-red-600 font-bold mb-3 tracking-widest text-sm flex items-center">
                            <iconify-icon icon="mdi:image-multiple-outline" class="mr-2"></iconify-icon> 相关影像附件
                        </h4>
                        ${images.map(img => `
                            <div class="group relative overflow-hidden rounded-lg border border-white/10">
                                <img src="${img.url}" class="w-full h-auto object-cover grayscale opacity-70 group-hover:grayscale-0 group-hover:opacity-100 transition-all duration-700">
                                <div class="absolute bottom-0 left-0 right-0 bg-black/60 p-4 backdrop-blur-sm">
                                    <p class="text-[10px] text-gray-300 font-mono italic">${img.caption}</p>
                                </div>
                            </div>
                        `).join('')}
                        <div class="bg-red-900/10 border border-red-900/30 p-6 rounded text-[10px] font-mono text-red-400">
                            <p class="mb-2">警告：部分影像可能引起不适。</p>
                            <p>本档案所有内容受《超自然保密法案》保护，严禁任何形式的外部二次传播。</p>
                        </div>
                    </div>
                </div>
            `;

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('detail-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto';
        }

        window.onload = () => {
            renderArchives();
            
            const searchInput = document.getElementById('search-input');
            const levelFilter = document.getElementById('level-filter');
            
            function applyFilters() {
                const searchTerm = searchInput.value.toLowerCase().trim();
                const selectedLevel = levelFilter.value;
                
                let filteredData = archiveData;
                
                if (searchTerm !== '') {
                    filteredData = filteredData.filter(item => {
                        return (
                            item.id.toLowerCase().includes(searchTerm) ||
                            item.country.toLowerCase().includes(searchTerm) ||
                            item.name.toLowerCase().includes(searchTerm)
                        );
                    });
                }
                
                if (selectedLevel !== 'all') {
                    filteredData = filteredData.filter(item => item.level === selectedLevel);
                }
                
                renderArchives(filteredData);
            }
            
            if (searchInput) {
                searchInput.addEventListener('input', applyFilters);
            }
            
            if (levelFilter) {
                levelFilter.addEventListener('change', applyFilters);
            }
            
            if (window.location.hash) {
                const targetId = window.location.hash.substring(1);
                const element = document.getElementById(targetId);
                if (element) {
                    setTimeout(() => {
                        element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        element.classList.add('ring-2', 'ring-red-600', 'ring-offset-4', 'ring-offset-[#050507]');
                    }, 100);
                }
            }

            const cursor = document.getElementById('custom-cursor');
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });

            document.querySelectorAll('a, button, .cursor-pointer, input, select, iconify-icon').forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
            });
        };
    </script>
    <!-- 右下角标识 -->
    <div class="fixed bottom-4 right-4 text-xs text-gray-500 z-50 pointer-events-none">
        仅供娱乐，切勿当真
    </div>
</body>
</html>
