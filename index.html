            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(139, 0, 0, 0.7); }
            70% { transform: scale(1.5); opacity: 0; box-shadow: 0 0 0 10px rgba(139, 0, 0, 0); }

        .scanline {
            width: 100%;

            background: rgba(0, 242, 255, 0.1);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 4s linear infinite;
            z-index: 50;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        ::-webkit-scrollbar {
            width: 4px;

        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--horror-red);
            border-radius: 10px;
        }

        /* 页面过渡效果 */
        .page-transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark-bg);
            z-index: 99999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }

        .page-transition-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .page-transition-overlay.fade-out {
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }

        /* 导航链接悬停效果 */
        .nav-link {
            position: relative;
            padding: 0.5rem 0;
            transition: all 0.3s ease;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--horror-red), var(--ghost-cyan));
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-link:hover {
            color: var(--ghost-cyan);
            text-shadow: 0 0 10px var(--ghost-cyan);
        }

        /* 页面加载动画 */
        .page-content {
            animation: pageLoad 0.6s ease-out forwards;
        }

        @keyframes pageLoad {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #three-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }

        .node-marker {
            cursor: pointer;
            transition: all 0.3s;
        }
        .node-marker:hover {
            filter: brightness(1.5) drop-shadow(0 0 8px var(--horror-red));
        }

        /* 自定义光标 */
        #custom-cursor {
            width: 20px;
            height: 20px;
            border: 2px solid #00ffff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.15s ease-out, width 0.2s, height 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #custom-cursor::after {
            content: '';
            width: 4px;
            height: 4px;
            background-color: #00ffff;
            border-radius: 50%;
        }

        #custom-cursor.hovering {
            width: 30px;
            height: 30px;
            background-color: rgba(0, 255, 255, 0.1);
            border-color: #00ffff;
            transform: translate(-50%, -50%) scale(1.2);
        }

        #custom-cursor.locked {
            width: 24px;
            height: 24px;
            background-color: rgba(0, 255, 255, 0.2);
            border-color: #00ffff;
            transform: translate(-50%, -50%) scale(1.1);
        }

        #custom-cursor.locked::after {
            background-color: #00ffff;
            width: 6px;
            height: 6px;
        }

        body, a, button, .cursor-pointer, canvas {
            cursor: none !important;
        }

<div class="page-transition-overlay" id="pageTransition">

<script>
(function() {
    const overlay = document.getElementById('pageTransition');
    let isTransitioning = false;

    overlay.classList.add('active');
    setTimeout(() => {
        overlay.classList.add('fade-out');
        setTimeout(() => {
            overlay.classList.remove('active', 'fade-out');
        }, 300);
    }, 500);

    document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', function(e) {
            const href = this.getAttribute('href');
            if (href && href.endsWith('.html') && !isTransitioning) {
                e.preventDefault();
                isTransitioning = true;
                overlay.classList.add('active');
                setTimeout(() => {
                    window.location.href = href;
                }, 400);
            }
        });
    });
})();
</script>

        // Three.js 全局变量
        let scene, camera, renderer, globe, controls;
        let markers = [];
        let isRotating = true;

        function filterByTimeFrame(type) {
            const btnModern = document.getElementById('btn-modern');
            const btnAncient = document.getElementById('btn-ancient');
            
            // 切换按钮样式
            if (type === '近现代') {
                btnModern.className = "flex-1 py-1.5 text-[10px] md:text-xs rounded bg-red-500 text-white";
                btnAncient.className = "flex-1 py-1.5 text-[10px] md:text-xs rounded bg-gray-700 text-gray-400";
            } else {
                btnAncient.className = "flex-1 py-1.5 text-[10px] md:text-xs rounded bg-red-500 text-white";
                btnModern.className = "flex-1 py-1.5 text-[10px] md:text-xs rounded bg-gray-700 text-gray-400";
            }

            // 过滤标记
            markers.forEach(marker => {
                const event = marker.userData;
                let visible = false;
                if (type === '近现代') {
                    visible = (event.timeFrame === '近现代');
                } else if (type === '古老传说') {
                    visible = (event.timeFrame === '古老传说' || event.timeFrame === '远古');
                }
                marker.visible = visible;
            });

            // 如果当前悬停的标记被隐藏，重置它
            if (hoveredMarker && !hoveredMarker.visible) {
                resetMarker(hoveredMarker);
                hoveredMarker = null;
                document.getElementById('custom-cursor').classList.remove('hovering');
            }
            
            // 切换维度时关闭详情面板，防止信息错位
            closeDetail();

            // 更新总数统计
            const filteredCount = paranormalEvents.filter(event => {
                if (type === '近现代') return event.timeFrame === '近现代';
                return event.timeFrame === '古老传说' || event.timeFrame === '远古';
            }).length;
            document.getElementById('total-events-count').innerText = filteredCount;
        }

        function initThree() {
            const container = document.getElementById('three-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.z = 350;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, logarithmicDepthBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 光照增强 - 优化平衡以防止色块过曝
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
            mainLight.position.set(1, 1, 1);
            scene.add(mainLight);
            const pointLight = new THREE.PointLight(0xff3e3e, 1.2, 1000);
            pointLight.position.set(150, 150, 150);
            scene.add(pointLight);

            // 初始化 ThreeGlobe
            globe = new ThreeGlobe()
                .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
                .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
                .showAtmosphere(false); // 显式禁用大气层，防止出现边缘色块或光晕
            
            // 优化地球材质，使用 MeshPhongMaterial 特性 (ThreeGlobe 默认可能使用 MeshLambert 或 MeshPhong)
            const globeMaterial = globe.globeMaterial();
            globeMaterial.color = new THREE.Color(0x666666); // 降低基础亮度，增强红线的对比度
            globeMaterial.emissive = new THREE.Color(0x000000); 
            globeMaterial.specular = new THREE.Color(0x222222); 
            globeMaterial.shininess = 5; 

            // 调整基础球体半径为 99.8，防止与半径为 100 的地球模型产生 Z-fighting
            const baseSphereGeo = new THREE.SphereGeometry(99.8, 64, 64);
            const baseSphereMat = new THREE.MeshPhongMaterial({ 
                color: 0x050507, // 使用深色背景色
                transparent: true,
                opacity: 0.8
            });
            const baseSphere = new THREE.Mesh(baseSphereGeo, baseSphereMat);
            globe.add(baseSphere);

            // 加载国家边界 - 采用更直接、可靠的 GeoJSON 数据源
            fetch('https://unpkg.com/three-globe/example/img/ne_110m_admin_0_countries.geojson')
                .then(res => res.json())
                .then(countries => {
                    globe.polygonsData(countries.features)
                        .polygonCapColor(() => 'rgba(255, 85, 85, 0.01)')
                        .polygonSideColor(() => 'rgba(255, 85, 85, 0.8)')
                        .polygonAltitude(0.005)
                        .polygonCapMaterial(new THREE.MeshPhongMaterial({
                            color: 0xff5555,
                            transparent: true,
                            opacity: 0.05,
                            wireframe: true, // 开启线框模式，增强“线框标记”感
                            side: THREE.DoubleSide
                        }))
                        .polygonSideMaterial(new THREE.MeshPhongMaterial({
                            color: 0xff5555,
                            emissive: 0xff5555,
                            emissiveIntensity: 3, // 极强发光，确保突出
                            transparent: true,
                            opacity: 0.9
                        }));
                }).catch(err => {
                    console.error('GeoJSON load failed:', err);
                    fetch('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson')
                        .then(res => res.json())
                        .then(countries => {
                            globe.polygonsData(countries.features)
                                .polygonCapColor(() => 'rgba(255, 85, 85, 0.01)')
                                .polygonSideColor(() => 'rgba(255, 85, 85, 0.8)')
                                .polygonAltitude(0.005);
                        });                });

            scene.add(globe);

            // 星空背景
            const starGeometry = new THREE.BufferGeometry();
            const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 });
            const starVertices = [];
            for (let i = 0; i < 6000; i++) {
                const x = (Math.random() - 0.5) * 2000;
                const y = (Math.random() - 0.5) * 2000;
                const z = (Math.random() - 0.5) * 2000;
                starVertices.push(x, y, z);
            }
            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.rotateSpeed = 0.2; // 降低旋转速度，减少灵敏度
            controls.minDistance = 120;
            controls.maxDistance = 500;

            // 添加事件标记
            paranormalEvents.forEach(event => {
                addMarker(event);
            });

            animate();
        }

        // 光束位置偏移计数器
        let markerCounter = 0;

        function addMarker(event) {
            let lat = event.coords.lat;
            let lng = event.coords.lng;
            
            // 根据计数器应用固定偏移量
            markerCounter++;
            const offset = 0.4; // 固定偏移量
            
            switch (markerCounter % 5) {
                case 1: // 第1个事件：纬度 +0.4，经度不变
                    lat += offset;
                    break;
                case 2: // 第2个事件：纬度 -0.4，经度不变
                    lat -= offset;
                    break;
                case 3: // 第3个事件：纬度不变，经度 +0.4
                    lng += offset;
                    break;
                case 4: // 第4个事件：纬度不变，经度 -0.4
                    lng -= offset;
                    break;
                case 0: // 第5个事件：纬度 +0.4，经度 +0.4
                    lat += offset;
                    lng += offset;
                    break;
            }
            
            const latRad = lat * Math.PI / 180;
            const lngRad = lng * Math.PI / 180;
            const radius = 102; // 稍微高于地球表面 (100) 以防遮挡

            const x = radius * Math.cos(latRad) * Math.sin(lngRad);
            const y = radius * Math.sin(latRad);
            const z = radius * Math.cos(latRad) * Math.cos(lngRad);

            const group = new THREE.Group();
            group.position.set(x, y, z);
            
            // 计算法线向量并对齐组的朝向
            const vector = new THREE.Vector3(x, y, z).normalize();
            const quaternion = new THREE.Quaternion();
            quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), vector);
            group.quaternion.copy(quaternion);

            // 1. 命中盒 (不可见) - 增大碰撞检测区域
            const hitGeo = new THREE.CylinderGeometry(8, 8, 50, 16);
            const hitMat = new THREE.MeshBasicMaterial({ visible: false });
            const hitBox = new THREE.Mesh(hitGeo, hitMat);
            hitBox.position.y = 25; 
            group.add(hitBox);
            
            // 2. 核心亮线 (细小光束结构) - 简约科技风格，高度进一步缩减至 1/9 半径 (原 1/3 的三分之一)
            const beamHeight = (100 / 9) * (0.9 + Math.random() * 0.2);
            const coreGeo = new THREE.CylinderGeometry(0.3, 0.3, beamHeight, 8);
            coreGeo.translate(0, beamHeight / 2, 0); // 预先偏移几何体，使底部位于原点，方便后续缩放
            const coreMat = new THREE.MeshBasicMaterial({ 
                color: 0xff0000, 
                transparent: true, 
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const core = new THREE.Mesh(coreGeo, coreMat);
            core.position.y = 0; // 几何体已平移，坐标设为0
            group.add(core);

            group.userData = event;
            globe.add(group);
            markers.push(group);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            // 地球缓慢自转
            if (globe && isRotating) {
                globe.rotation.y += 0.001;
            }

            // 计算动态缩放比例：基于相机距离
            // 基准距离设为 350 (初始距离)，比例范围限制在 0.4 到 2.2 之间以应对极端缩放
            const cameraDist = camera.position.length();
            const dynamicScale = Math.max(0.4, Math.min(2.2, cameraDist / 350));

            // 标记点动态效果 - 保持呼吸感且随缩放变化
            markers.forEach(group => {
                const core = group.children[1];
                const hitBox = group.children[0]; // 命中盒
                const time = Date.now() * 0.001;
                const breath = 0.8 + Math.sin(time * 3) * 0.2;
                
                // 动态调整命中盒大小，确保在不同缩放级别下都有良好的点击体验
                if (hitBox) {
                    // 命中盒大小随相机距离调整，确保在放大时也能容易点击
                    const hitScale = Math.max(0.8, Math.min(3, cameraDist / 200));
                    hitBox.scale.set(hitScale, hitScale, hitScale);
                }
                
                if (hoveredMarker !== group) {
                    // 呼吸效果：透明度和宽度交替变化，叠加动态缩放
                    // 放大地球(距离减小)时，dynamicScale减小，光束自动缩小
                    core.scale.set(breath * dynamicScale, dynamicScale, breath * dynamicScale);
                    core.material.opacity = 0.6 + Math.sin(time * 3) * 0.2;
                } else {
                    // 悬停时增强对比，同时保持与环境比例协调
                    core.material.opacity = 1.0;
                    core.scale.set(1.5 * dynamicScale, 1.2 * dynamicScale, 1.5 * dynamicScale);
                }
            });

            renderer.render(scene, camera);
        }

        // 交互逻辑
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredMarker = null;
        let lockedMarker = null;
        let isDragging = false;
        let lastMousePos = { x: 0, y: 0 };
        const DRAG_THRESHOLD = 5; // 拖动阈值，像素

        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mouseup', onMouseUp);

        function onMouseMove(event) {
            // 更新自定义光标位置
            const cursor = document.getElementById('custom-cursor');
            cursor.style.left = event.clientX + 'px';
            cursor.style.top = event.clientY + 'px';

            // 如果已经有锁定的标记，仍然可以显示tooltip，但保持locked类
            const tooltip = document.getElementById('event-tooltip');
            
            // 修正 NDC 坐标转换
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // 处理所有交互元素的悬停
            const interactive = document.querySelectorAll('a, button, .cursor-pointer, .node-marker');
            interactive.forEach(el => {
                const elRect = el.getBoundingClientRect();
                if (!lockedMarker && event.clientX >= elRect.left && event.clientX <= elRect.right && 
                    event.clientY >= elRect.top && event.clientY <= elRect.bottom) {
                    cursor.classList.add('hovering');
                } else if (!lockedMarker) {
                    cursor.classList.remove('hovering');
                }
            });
            
            // 提高射线检测精度
            raycaster.params.Line.threshold = 3;
            raycaster.params.Points.threshold = 3;

            // 过滤掉不可见的标记，确保交互状态与显示状态一致
            const visibleMarkers = markers.filter(m => m.visible);
            const intersects = raycaster.intersectObjects(visibleMarkers, true);
            let found = false;
            
            if (intersects.length > 0) {
                // 按距离排序，优先处理最近的对象
                intersects.sort((a, b) => a.distance - b.distance);
                
                for (let i = 0; i < intersects.length; i++) {
                    const obj = intersects[i].object;
                    let target = obj;
                    // 向上查找标记点组 (Group)
                    while (target && !target.userData.id) {
                        target = target.parent;
                    }

                    if (target && target.userData && target.userData.id) {
                        if (hoveredMarker !== target) {
                            if (hoveredMarker && hoveredMarker !== lockedMarker) resetMarker(hoveredMarker);
                            hoveredMarker = target;
                            if (hoveredMarker !== lockedMarker) {
                                highlightMarker(hoveredMarker);
                            }
                            if (!lockedMarker) {
                                cursor.classList.add('hovering');
                            }
                        }
                        // 显示事件名称 tooltip
                        tooltip.textContent = target.userData.name;
                        tooltip.style.left = (event.clientX + 10) + 'px';
                        tooltip.style.top = (event.clientY - 30) + 'px';
                        tooltip.style.opacity = '1';
                        found = true;
                        break;
                    }
                }
            }

            if (!found) {
                if (hoveredMarker && hoveredMarker !== lockedMarker) {
                    resetMarker(hoveredMarker);
                    hoveredMarker = null;
                    if (!lockedMarker) {
                        cursor.classList.remove('hovering');
                    }
                }
                // 隐藏 tooltip
                tooltip.style.opacity = '0';
            }
        }

        function highlightMarker(markerGroup) {
            if (!markerGroup) return;
            const core = markerGroup.children[1];
            if (core && core.material) {
                core.material.color.set(0x00ffff);
            }
        }

        function resetMarker(markerGroup) {
            if (!markerGroup) return;
            const core = markerGroup.children[1];
            if (core && core.material) {
                core.material.color.set(0xff0000);
            }
        }

        function onMouseDown(event) {
            // 记录鼠标按下位置
            lastMousePos = { x: event.clientX, y: event.clientY };
            isDragging = false;
        }

        function onMouseUp(event) {
            // 检查是否点击在详情面板或关闭按钮上，如果是则不处理
            if (event.target.closest('#detail-panel') || event.target.closest('button')) {
                return;
            }

            // 检查是否有拖动
            const dragDistance = Math.sqrt(
                Math.pow(event.clientX - lastMousePos.x, 2) +
                Math.pow(event.clientY - lastMousePos.y, 2)
            );

            // 如果拖动距离超过阈值，认为是拖动操作，不处理点击
            if (dragDistance > DRAG_THRESHOLD) {
                isDragging = true;
                return;
            }

            // 如果没有拖动，处理点击
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            // 过滤掉不可见的标记，确保用户无法点击到被隐藏的光束
            const visibleMarkers = markers.filter(m => m.visible);
            const intersects = raycaster.intersectObjects(visibleMarkers, true);

            if (intersects.length > 0) {
                // 按距离排序，优先处理最近的对象
                intersects.sort((a, b) => a.distance - b.distance);
                
                for (let i = 0; i < intersects.length; i++) {
                    const obj = intersects[i].object;
                    let target = obj;
                    while (target && !target.userData.id) {
                        target = target.parent;
                    }

                    if (target && target.userData && target.userData.id) {
                        // 如果点击的是当前已锁定的事件，不做任何操作
                        if (lockedMarker === target) {
                            return;
                        }

                        // 如果已经有锁定的标记，先关闭当前详情面板
                        if (lockedMarker) {
                            closeDetail();
                        }

                        // 锁定当前标记
                        lockedMarker = target;
                        // 重置悬停状态
                        if (hoveredMarker) {
                            resetMarker(hoveredMarker);
                            hoveredMarker = null;
                        }
                        // 高亮锁定的标记
                        highlightMarker(lockedMarker);
                        showDetail(target.userData);
                        // 添加锁定状态的光标样式
                        document.getElementById('custom-cursor').classList.add('locked');
                        return;
                    }
                }
            } else if (lockedMarker) {
                // 点击空白区域时，关闭详情面板
                closeDetail();
            }
        }

        function showDetail(eventData) {
            const panel = document.getElementById('detail-panel');
            const content = document.getElementById('detail-content');
            
            panel.classList.remove('translate-x-full');
            
            content.innerHTML = `
                <div class="mb-8">
                    <div class="flex items-center space-x-4 mb-4">
                        <div class="w-16 h-16 bg-red-900/30 border border-red-600 rounded-full flex items-center justify-center">
                            <iconify-icon icon="${eventData.icon}" class="text-4xl text-red-500"></iconify-icon>
                        </div>
                        <div>
                            <span class="text-xs text-cyan-400 font-mono">FILE: #${eventData.id.toUpperCase()}</span>
                            <h2 class="text-2xl font-bold title-font text-gray-100">${eventData.name}</h2>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <span class="px-2 py-1 bg-red-900/40 text-[10px] text-red-300 rounded border border-red-700/50">所属国家: ${eventData.country}</span>
                        <span class="px-2 py-1 bg-amber-900/40 text-[10px] text-amber-300 rounded border border-amber-700/50">时间维度: ${eventData.timeFrame}</span>
                        <span class="px-2 py-1 bg-cyan-900/40 text-[10px] text-cyan-300 rounded border border-cyan-700/50">坐标: ${eventData.coords.lat.toFixed(2)}, ${eventData.coords.lng.toFixed(2)}</span>
                    </div>
                </div>

                <div class="space-y-8">
                    <section>
                        <h4 class="text-xs font-bold text-red-600 uppercase tracking-[0.2em] mb-3 flex items-center">
                            <span class="w-8 h-[1px] bg-red-600 mr-2"></span> 历史背景
                        </h4>
                        <p class="text-sm leading-relaxed text-gray-400 text-justify">${eventData.history}</p>
                    </section>

                    <section>
                        <h4 class="text-xs font-bold text-red-600 uppercase tracking-[0.2em] mb-3 flex items-center">
                            <span class="w-8 h-[1px] bg-red-600 mr-2"></span> 灵异现象描述
                        </h4>
                        <div class="bg-black/40 p-4 rounded border-l-2 border-red-600 italic">
                            <p class="text-sm leading-relaxed text-gray-300">"${eventData.phenomena}"</p>
                        </div>
                    </section>

                    <section>
                        <h4 class="text-xs font-bold text-red-600 uppercase tracking-[0.2em] mb-3 flex items-center">
                            <span class="w-8 h-[1px] bg-red-600 mr-2"></span> 深度分析报告
                        </h4>
                        <p class="text-sm leading-relaxed text-gray-400 text-justify">${eventData.analysis}</p>
                    </section>

                    <section class="pt-6 border-t border-gray-800">
                        <p class="text-[10px] text-gray-600 font-mono mb-4 text-center">档案最后更新于 ${new Date().toLocaleString('zh-CN')}</p>
                        <a href="archives.html#${eventData.id}" class="block w-full py-3 bg-red-900/20 hover:bg-red-900/40 border border-red-800 text-red-500 text-xs text-center font-bold transition-all rounded">
                            查看绝密档案
                        </a>
                    </section>
                </div>
            `;
        }

        function closeDetail() {
            document.getElementById('detail-panel').classList.add('translate-x-full');
            // 移除锁定状态的光标样式
            document.getElementById('custom-cursor').classList.remove('locked');
            // 清除锁定状态
            if (lockedMarker) {
                resetMarker(lockedMarker);
                lockedMarker = null;
            }
        }

        function resetGlobe() {
            isRotating = true;
            const startPos = camera.position.clone();
            const endPos = new THREE.Vector3(0, 0, 350);
            
            let startTime = null;
            const duration = 1500;

            const step = (timestamp) => {
                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3);
                
                camera.position.lerpVectors(startPos, endPos, ease);
                camera.lookAt(0, 0, 0);
                controls.target.set(0, 0, 0);
                
                if (progress < 1) {
                    requestAnimationFrame(step);
                }
            };
            requestAnimationFrame(step);
        }

        function focusContinent(continent) {
            isRotating = false;
            const targets = {
                asia: { lat: 35, lng: 105 },
                europe: { lat: 50, lng: 15 },
                africa: { lat: 5, lng: 20 },
                north_america: { lat: 40, lng: -100 },
                south_america: { lat: -20, lng: -60 },
                oceania: { lat: -25, lng: 135 }
            };
            const target = targets[continent];
            if (!target) return;
            
            const latRad = target.lat * Math.PI / 180;
            const lngRad = target.lng * Math.PI / 180;
            const dist = 280; 

            // 本地坐标（相对于地球）
            const localX = dist * Math.cos(latRad) * Math.sin(lngRad);
            const localY = dist * Math.sin(latRad);
            const localZ = dist * Math.cos(latRad) * Math.cos(lngRad);
            
            const targetVec = new THREE.Vector3(localX, localY, localZ);
            // 转换为世界坐标，以对应当前地球的旋转状态
            const worldTarget = globe.localToWorld(targetVec.clone());
            
            const startPos = camera.position.clone();
            const endPos = worldTarget;
            
            let startTime = null;
            const duration = 1200; // 毫秒

            const step = (timestamp) => {
                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // 平滑减速曲线
                const ease = 1 - Math.pow(1 - progress, 3);
                
                camera.position.lerpVectors(startPos, endPos, ease);
                camera.lookAt(0, 0, 0);
                controls.target.set(0, 0, 0);
                
                if (progress < 1) {
                    requestAnimationFrame(step);
                }
            };
            requestAnimationFrame(step);
        }

        window.onload = () => {
            initThree();
            
            // 默认选中近现代事件
            filterByTimeFrame('近现代');
            
            // 模拟日志更新
            setInterval(() => {
                const logs = [
                    "检测到暗能量脉冲...",
                    "维度壁垒厚度下降 0.02%",
                    "收到来自坐标 [42.1, -71.2] 的干扰信号",
                    "监控系统重载中...",
                    "已拦截一起未授权的灵魂接入"
                ];
                const container = document.getElementById('log-container');
                const log = document.createElement('div');
                log.className = "border-l-2 border-gray-500/30 pl-3 py-1 animate-pulse";
                log.innerHTML = `
                    <p class="text-[10px] font-mono text-gray-500">2026年4月19日 ${new Date().toLocaleTimeString()} UTC</p>
                    <p class="text-xs text-gray-400">${logs[Math.floor(Math.random() * logs.length)]}</p>
                `;
                container.prepend(log);
                if (container.children.length > 8) container.lastChild.remove();
                
                // 稳定性小幅波动
                const stabilityVal = (24.8 + (Math.random() * 0.4 - 0.2)).toFixed(1);
                const stabBar = document.getElementById('stability-bar');
                if (stabBar) {
                    stabBar.style.width = stabilityVal + '%';
                    stabBar.parentElement.previousElementSibling.children[1].innerText = stabilityVal + '%';
                }
            }, 5000);
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
    <!-- 右下角标识 -->
    <div class="fixed bottom-4 right-4 text-xs text-gray-500 z-50 pointer-events-none">
        仅供娱乐，切勿当真
    </div>
</body>
